<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Races</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <style>
        .calendar-container {
            max-width: 900px;
            margin: 30px auto;
        }
        #calendar {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<h1>F1 Races Calendar</h1>

<div style="margin-bottom:20px;">
    <label>Show only sprints?</label>
    <select id="sprintFilter">
        <option value="">All</option>
        <option value="true">Sprint</option>
        <option value="false">Regular Race</option>
    </select>

    <button id="filterSprintBtn">Filter</button>
    <button id="orderLapsBtn">Order by Laps</button>
    <button id="filterAndOrderBtn">Filter + Order</button>
</div>

<p id="filterMessage" style="color:red;"></p>

<div class="calendar-container">
    <div id="calendar"></div>
</div>

<h2>All Races</h2>

<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th>Round</th>
        <th>Date</th>
        <th>Country</th>
        <th>Type</th>
        <th>Laps</th>
    </tr>
    </thead>
    <tbody id="races-body">
    <tr th:each="c,stat : ${curse}">
        <td th:text="${stat.index + 1}">1</td>
        <td th:text="${c.dataCursei}">2025-01-01</td>
        <td th:text="${c.tara}">Country</td>
        <td th:text="${c.sprint ? 'Sprint' : 'Race'}">Race</td>
        <td th:text="${c.nrLaps}">0</td>
    </tr>
    </tbody>
</table>

<a href="/home">Back to Home</a>

<script>
    document.addEventListener('DOMContentLoaded', function () {

        let currentSprintFilter = "";
        let calendarEl = document.getElementById('calendar');

        let calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,listYear'
            }
        });

        calendar.render();

        function renderTableAndCalendar(races) {
            const tbody = document.getElementById("races-body");
            tbody.innerHTML = "";
            calendar.removeAllEvents();

            races.forEach((c, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${c.dataCursei}</td>
                        <td>${c.tara}</td>
                        <td>${c.sprint ? 'Sprint' : 'Race'}</td>
                        <td>${c.nrLaps}</td>
                    </tr>
                `;

                calendar.addEvent({
                    title: c.tara + (c.sprint ? ' (Sprint)' : ''),
                    start: c.dataCursei,
                    extendedProps: { type: c.sprint ? 'Sprint' : 'Race' }
                });
            });
        }

        document.getElementById("filterSprintBtn").addEventListener("click", function () {
            currentSprintFilter = document.getElementById("sprintFilter").value;

            if (currentSprintFilter === "true" || currentSprintFilter === "false") {
                fetch(`/races/filter?sprint=${currentSprintFilter}`)
                    .then(res => res.json())
                    .then(data => renderTableAndCalendar(data))
                    .catch(err => console.error(err));
            } else {
                location.reload();
            }
        });

        document.getElementById("orderLapsBtn").addEventListener("click", function () {
            fetch(`/races/order-by-laps`)
                .then(res => res.json())
                .then(data => renderTableAndCalendar(data))
                .catch(err => console.error(err));
        });

        document.getElementById("filterAndOrderBtn").addEventListener("click", function () {
            const sprintValue = document.getElementById("sprintFilter").value;

            if (sprintValue === "true" || sprintValue === "false") {
                fetch(`/races/filter?sprint=${sprintValue}`)
                    .then(res => res.json())
                    .then(filtered => {
                        filtered.sort((a, b) => b.nrLaps - a.nrLaps);
                        renderTableAndCalendar(filtered);
                    })
                    .catch(err => console.error(err));
            } else {
                fetch(`/races/order-by-laps`)
                    .then(res => res.json())
                    .then(data => renderTableAndCalendar(data))
                    .catch(err => console.error(err));
            }
        });

    });
</script>

</body>
</html>

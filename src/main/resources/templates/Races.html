<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Races</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        .calendar-container {
            max-width: 900px;
            margin: 30px auto;
        }
        #calendar {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<h1>F1 Races Calendar</h1>

<div class="calendar-container">
    <div id="calendar"></div>
</div>

<h2>All Races</h2>
<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th>Round</th>
        <th>Date</th>
        <th>Country</th>
        <th>Type</th>
        <th>Laps</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c,stat : ${curse}">
        <td th:text="${stat.index + 1}">1</td>
        <td th:text="${c.dataCursei}">2025-01-01</td>
        <td th:text="${c.tara}">Country</td>
        <td th:text="${c.isSprint ? 'Sprint' : 'Race'}">Race</td>
        <td th:text="${c.nr_laps}">0</td>
    </tr>
    </tbody>
</table>

<a href="/home">Back to Home</a>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,listYear'
            },
            events: '/api/races',
            eventClick: function(info) {
                alert(info.event.title + ' - ' + info.event.extendedProps.type);
            }
        });
        calendar.render();
    });
</script>
</body>
</html>

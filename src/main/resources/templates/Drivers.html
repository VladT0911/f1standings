<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Drivers</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<h1>F1 Drivers</h1>
<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th>Pos</th>
        <th>Name</th>
        <th>Team</th>
        <th>Points</th>
        <th>Wins</th>
        <th>Podiums</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="d,stat : ${drivers}">
        <td th:text="${stat.index + 1}">1</td>
        <td th:text="${d.nume}">Driver Name</td>
        <td th:text="${d.echipa}">Team</td>
        <td th:text="${d.nrPuncte}">0</td>
        <td th:text="${d.nr_victorii}">0</td>
        <td th:text="${d.nr_podiumuri}">0</td>
    </tr>
    </tbody>
</table>
</body>
</html>

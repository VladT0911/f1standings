<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Teams Standings</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="page-background teams-background">
<button onclick="window.location.href='/home'">Back to Home</button>
<h1>F1 Teams Standings</h1>

<!-- FILTER BY POWER UNIT -->
<form th:action="@{/teams}" method="get">
    <label>
        Filter by Power Unit:
        <input type="text" name="powerunit" th:value="${powerunit}" placeholder="Mercedes, Ferrari..." />
    </label>
    <button type="submit">Filter</button>
</form>

<br/>

<!-- SORT BY TEAM PRINCIPAL -->
<form th:action="@{/teams}" method="get">
    <input type="hidden" name="sort" value="principal"/>
    <input type="hidden" name="powerunit" th:if="${powerunit != null}" th:value="${powerunit}"/>
    <button type="submit">Sort by Team Principal (A–Z)</button>
</form>

<br/><br/>


<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th>Pos</th>
        <th>Team</th>
        <th>Power Unit</th>
        <th>Team Principal</th>
        <th>Points</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e, stat : ${echipe}">
        <td th:text="${stat.index + 1}">1</td>
        <td th:text="${e.nume}">Team Name</td>
        <td th:text="${e.powerunit}">Power Unit</td>
        <td th:text="${e.TeamPrincipal}">Team Principal</td>
        <td th:text="${e.nrPuncte}">0</td>
    </tr>
    </tbody>
</table>

<br/>


</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Teams Standings</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<h1>F1 Teams Standings</h1>
<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th>Pos</th>
        <th>Team</th>
        <th>Power Unit</th>
        <th>Team Principal</th>
        <th>Points</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e,stat : ${echipe}">
        <td th:text="${stat.index + 1}">1</td>
        <td th:text="${e.nume}">Team Name</td>
        <td th:text="${e.powerunit}">Power Unit</td>
        <td th:text="${e.Team_principal}">Team Principal</td>
        <td th:text="${e.nrPuncte}">0</td>
    </tr>
    </tbody>
</table>
<a href="/home">Back to Home</a>
</body>
</html>

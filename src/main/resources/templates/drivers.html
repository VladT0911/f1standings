<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Drivers</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        body {
    font-family: 'Arial', sans-serif;
    background-image: url('/images/f1-background.jpg'); /* add your image in static/images */
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
    margin: 0;
    padding: 0 20px;
}

/* Headings */
h1 {
    text-align: center;
    margin-top: 30px;
    color: #ff0000; /* F1 red */
    text-shadow: 2px 2px 4px black;
}

/* Table styling */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background-color: rgba(0, 0, 0, 0.8); /* semi-transparent black */
    border-radius: 10px;
    overflow: hidden;
}

table th, table td {
    padding: 12px 15px;
    text-align: center;
    border-bottom: 1px solid #ff0000;
}

table th {
    background-color: #ff0000;
    color: white;
    font-size: 16px;
}

table tr:nth-child(even) {
    background-color: rgba(255, 255, 255, 0.1);
}

table tr:hover {
    background-color: rgba(255, 0, 0, 0.5);
    cursor: pointer;
}

/* Buttons */
button {
    background-color: #ff0000;
    color: black;
    border: none;
    padding: 10px 20px;
    margin: 5px;
    font-size: 14px;
    font-weight: bold;
    border-radius: 5px;
    transition: 0.3s;
    cursor: pointer;
}

button:hover {
    background-color: black;
    color: #ff0000;
    border: 2px solid #ff0000;
}

/* Inputs */
input[type="text"], input[type="number"] {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ff0000;
    margin: 5px;
    width: 180px;
    color: black;
    font-weight: bold;
}

/* Filter message */
#filterMessage {
    margin-top: 10px;
    font-weight: bold;
}
    </style>
</head>
<body>
<div style="margin-bottom: 20px;">
    <button onclick="loadAll()">Show All Drivers</button>
    <button onclick="loadTop()">Show Top Driver</button>
    <button onclick="loadTop3()">Show Top 3 Drivers</button>
    <button onclick="loadNrvictorii()">Show By Number of victories</button>
</div>
<div style="margin-bottom:20px;">
    <label>Team Name:</label>
    <input type="text" id="teamInput" placeholder="Enter team name" />
    <label>Minimum Points:</label>
    <input type="number" id="pointsInput" placeholder="Enter minimum points" />
    <button type="button" id="teamFilterBtn">Filter by Team</button>
    <button type="button" id="pointsFilterBtn">Filter by Points</button>
    <button type="button" id="combinedFilterBtn">Filter Team + Points</button>
</div>
<p id="filterMessage" style="color:red;"></p>
<h1>F1 Drivers</h1>
<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th>Pos</th>
        <th>Name</th>
        <th>Team</th>
        <th>Points</th>
        <th>Wins</th>
        <th>Podiums</th>
    </tr>
    </thead>
    <tbody id="drivers-body">
    <tr th:each="d,stat : ${drivers}">
        <td th:text="${stat.index + 1}">1</td>
        <td th:text="${d.nume}">Driver Name</td>
        <td th:text="${d.echipa}">Team</td>
        <td th:text="${d.nrPuncte}">0</td>
        <td th:text="${d.nrVictorii}">0</td>
        <td th:text="${d.nrPodiumuri}">0</td>
    </tr>
    </tbody>
</table>

<a href="/home">Back to Home</a>
<script>
    function renderTable(drivers) {
        const tbody = document.getElementById("drivers-body");
        tbody.innerHTML = "";

        drivers.forEach((d, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${d.nume}</td>
                    <td>${d.echipa}</td>
                    <td>${d.nrPuncte}</td>
                    <td>${d.nrVictorii}</td>
                    <td>${d.nrPodiumuri}</td>
                </tr>
            `;
        });
    }

    function loadAll() {
        fetch("/api/drivers")
            .then(res => res.json())
            .then(data => renderTable(data));
    }

    function loadTop() {
        fetch("/api/drivers/top")
            .then(res => res.json())
            .then(data => renderTable(data));
    }

    function loadTop3() {
        fetch("/api/drivers/top3")
            .then(res => res.json())
            .then(data => renderTable(data));
    }
    function loadNrvictorii()
    {
    fetch("/api/drivers/nrvictorii")
    .then(res=>res.json())
    .then(data=>renderTable(data));
    }

    // Points-only filter
document.getElementById("pointsFilterBtn").addEventListener("click", function() {
    const points = document.getElementById("pointsInput").value;
    fetch(`/api/drivers/min-points?points=${points}`)
        .then(response => response.json())
        .then(drivers => renderTable(drivers))
        .catch(error => console.error("Error fetching drivers:", error));
});

// Team-only filter
document.getElementById("teamFilterBtn").addEventListener("click", function() {
    const echipa = document.getElementById("teamInput").value.trim();
    if (!echipa) {
        document.getElementById("filterMessage").textContent = "Please enter a team name.";
        return;
    }
    fetch(`/api/drivers/findechipa?echipa=${encodeURIComponent(echipa)}`)
        .then(response => response.json())
        .then(drivers => renderTable(drivers))
        .catch(error => console.error("Error fetching drivers:", error));
});

// Combined filter
document.getElementById("combinedFilterBtn").addEventListener("click", function() {
    const echipa = document.getElementById("teamInput").value.trim();
    const points = document.getElementById("pointsInput").value.trim();
    if (!echipa || !points || isNaN(points)) {
        document.getElementById("filterMessage").textContent = "Please enter valid team and points.";
        return;
    }
    fetch(`/api/drivers/filter?echipa=${encodeURIComponent(echipa)}&points=${points}`)
        .then(response => response.json())
        .then(drivers => renderTable(drivers))
        .catch(error => console.error("Error fetching drivers:", error));
});

</script>

</body>
</html>

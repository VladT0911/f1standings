<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>F1 Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        .dashboard-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 50px;
        }
        .dashboard-btn {
            padding: 20px 40px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .dashboard-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<h1>F1 Dashboard</h1>
<div class="dashboard-container">
    <a href="/drivers" class="dashboard-btn">Drivers Standings</a>
    <a href="/curse" class="dashboard-btn">Races</a>
    <a href="/echipe" class="dashboard-btn">Teams Standings</a>
</div>
</body>
</html>

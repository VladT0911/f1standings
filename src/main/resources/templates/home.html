<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>F1 Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            padding: 15px 30px;
        }

        .logout-btn {
            padding: 8px 16px;
            font-size: 14px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background-color: #b52a37;
        }

        h1 {
            text-align: center;
        }

        .dashboard-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 50px;
        }

        .dashboard-btn {
            padding: 20px 40px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .dashboard-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>


<div class="top-bar">
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="logout-btn">Logout</button>
    </form>
</div>

<h1>F1 Dashboard</h1>

<div class="dashboard-container">
    <a href="/drivers" class="dashboard-btn">Drivers Standings</a>
    <a href="/races" class="dashboard-btn">Races</a>
    <a href="/echipe" class="dashboard-btn">Teams Standings</a>
</div>

</body>
</html>
